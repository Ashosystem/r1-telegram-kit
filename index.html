<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, height=282, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Telegram v1.08</title>
<style>
  /* ─── Reset & Base ────────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #0e0e0e;
    --surface:   #1a1a1a;
    --surface-h: #252525;
    --accent:    #2aabee;   /* Telegram blue */
    --accent-dim:#1a6fa0;
    --text:      #e8e8e8;
    --text-dim:  #888;
    --out-bg:    #2b5278;
    --in-bg:     #1e1e1e;
    --danger:    #e53935;
    --confirm:   #43a047;
    --badge:     #e53935;
    --font:      'SF Pro Text', -apple-system, 'Segoe UI', sans-serif;
    --mono:      'SF Mono', 'Menlo', monospace;
  }

  html, body {
    width: 240px;
    height: 282px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    position: absolute;
    width: 240px; height: 282px;
    top: 0; left: 0;
    transition: transform 0.25s ease;
  }
  #app.landscape {
    width: 282px; height: 240px;
    top: 21px; left: -21px;
    transform: rotate(-90deg);
    transform-origin: center;
  }
  body.in-landscape .chat-list,
  body.in-landscape .messages-list { overflow: hidden; touch-action: none; }

  /* ─── Screen Container ────────────────────────────────────────── */
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ─── Header Bar ──────────────────────────────────────────────── */
  .header {
    height: 28px;
    min-height: 28px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    background: var(--surface);
    border-bottom: 1px solid #2a2a2a;
    gap: 6px;
  }
  .header .title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
  }
  .header .back {
    font-size: 26px;
    color: var(--accent);
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    margin: -4px -6px;
  }
  .header .badge-total {
    background: var(--badge);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    min-width: 16px;
    text-align: center;
  }

  /* ─── Chat List ───────────────────────────────────────────────── */
  .btn-read-all {
    font-size: 10px;
    color: #4fc3f7;
    background: none;
    border: 1px solid #4fc3f7;
    border-radius: 3px;
    padding: 1px 6px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chat-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .chat-list::-webkit-scrollbar { width: 2px; }
  .chat-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .chat-item {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    border-bottom: 1px solid #1f1f1f;
    cursor: pointer;
    gap: 7px;
    min-height: 38px;
    transition: background 0.1s;
  }
  .chat-item.selected { background: var(--surface-h); }
  .chat-item:active { background: var(--surface-h); }

  .chat-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }

  .chat-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .chat-name {
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .chat-preview {
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
  }
  .chat-time {
    font-size: 8px;
    color: var(--text-dim);
  }
  .unread-badge {
    background: var(--accent);
    color: #fff;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 7px;
    min-width: 14px;
    text-align: center;
  }

  /* ─── Chat View ───────────────────────────────────────────────── */
  .messages-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    -webkit-overflow-scrolling: touch;
  }
  .messages-list::-webkit-scrollbar { width: 2px; }
  .messages-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .msg-bubble {
    max-width: 85%;
    padding: 4px 7px;
    border-radius: 8px;
    font-size: 10px;
    line-height: 1.35;
    word-wrap: break-word;
  }
  .msg-bubble.in {
    background: var(--in-bg);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  .msg-bubble.out {
    background: var(--out-bg);
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .msg-sender {
    font-size: 9px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 1px;
  }
  .msg-time {
    font-size: 7px;
    color: rgba(255,255,255,0.4);
    text-align: right;
    margin-top: 1px;
  }

  .msg-bubble.has-photo { max-width: 96%; }
  .msg-reply {
    font-size: 9px; color: var(--text-dim);
    border-left: 2px solid var(--accent);
    padding: 1px 5px; margin-bottom: 2px;
    border-radius: 2px; background: rgba(42,171,238,0.08);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .msg-reply-author { color: var(--accent); font-weight: 700; margin-right: 3px; }
  .msg-reactions { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
  .msg-reaction { font-size: 9px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 1px 5px; }
  .audio-player {
    display: flex; align-items: center; gap: 6px;
    background: rgba(42,171,238,0.08);
    border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 4px 7px; margin-top: 3px;
    cursor: pointer; touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
  }
  .audio-play-btn { font-size: 13px; flex-shrink: 0; pointer-events: none; }
  .audio-label { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  .audio-player.playing { border-color: var(--accent); background: rgba(42,171,238,0.18); }
  .msg-bubble ul { margin: 2px 0 2px 10px; padding: 0; }
  .msg-bubble li { margin: 1px 0; list-style: disc; }
  .msg-bubble code { background: rgba(255,255,255,0.12); border-radius: 2px; padding: 0 2px; font-family: monospace; font-size: 9px; }
  .msg-bubble pre { background: rgba(255,255,255,0.08); border-radius: 3px; padding: 3px 4px; margin: 2px 0; overflow-x: auto; white-space: pre-wrap; }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble strong { font-weight: 700; }
  .msg-bubble em { font-style: italic; }

  /* ─── Status Bar (bottom) ─────────────────────────────────────── */
  .status-bar {
    height: 22px;
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-top: 1px solid #2a2a2a;
    font-size: 8px;
    color: var(--text-dim);
    gap: 4px;
  }
  .status-bar .hint {
    color: var(--accent);
    font-weight: 600;
  }

  /* ─── Recording Overlay ───────────────────────────────────────── */
  .recording-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 100;
  }
  .recording-overlay.active { display: flex; }

  .rec-ring {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid var(--danger);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .rec-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--danger);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .rec-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--danger);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .rec-hint {
    font-size: 9px;
    color: var(--text-dim);
  }

  /* ─── Confirm Screen ──────────────────────────────────────────── */
  .confirm-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 8px;
  }
  .confirm-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .confirm-text {
    flex: 1;
    background: var(--surface);
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    line-height: 1.4;
    color: var(--text);
    overflow-y: auto;
    border: 1px solid #2a2a2a;
  }
  .confirm-actions {
    display: flex;
    gap: 6px;
  }
  .confirm-actions button {
    flex: 1;
    height: 30px;
    border: none;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
  }
  .btn-cancel { background: #333; }
  .btn-send   { background: var(--confirm); }

  /* ─── Loading / Error States ──────────────────────────────────── */
  .state-msg {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    padding: 16px;
    text-align: center;
    line-height: 1.5;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Toast ───────────────────────────────────────────────────── */
  .toast {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--surface);
    color: var(--text);
    font-size: 9px;
    padding: 5px 10px;
    border-radius: 10px;
    border: 1px solid #333;
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── DOM Keyboard ────────────────────────────────────────────── */
  #compose-history {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    border-bottom: 1px solid #2a2a2a;
  }
  #compose-history::-webkit-scrollbar { width: 2px; }
  #compose-history::-webkit-scrollbar-thumb { background: #333; }
  #compose-history .msg-bubble { font-size: 9px; padding: 3px 6px; pointer-events: none; }
  #compose-history .msg-sender { font-size: 8px; }
  #compose-history .msg-time { display: none; }
  #compose-area {
    flex-shrink: 0;
    position: relative;
    margin: 3px 8px 3px;
  }
  #compose-display {
    height: 36px;
    background: var(--surface);
    border-radius: 6px;
    padding: 5px 22px 5px 8px;
    font-size: 12px;
    line-height: 1.4;
    overflow-y: auto;
    word-break: break-word;
    color: var(--text);
    border: 1px solid #2a2a2a;
  }
  #compose-display:empty::before { content: 'Type a message…'; color: var(--text-dim); pointer-events: none; }
  #compose-display:focus { outline: none; }
  #compose-display { caret-color: var(--accent); }
  #kbd-dismiss-btn {
    position: absolute;
    top: 3px; right: 4px;
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; line-height: 1; cursor: pointer; padding: 2px;
    touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
  }
  #virtual-keyboard {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 1px 4px 2px;
    gap: 1px;
    background: #111;
  }
  .kbd-row {
    display: flex;
    gap: 2px;
    justify-content: center;
  }
  .key {
    flex: 1;
    min-height: 22px;
    background: #2a2a2e;
    border: 1px solid #555;
    border-bottom: 2px solid #444;
    color: #fff;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
  }
  .key:active { background: #555; }
  .key.wide   { flex: 1.6; font-size: 9px; }
  .key.space  { flex: 4; }
  .key.action { background: #1a6fa0; border-color: #124e70; }
  .key.action:active { background: #2aabee; }
  .key.shifted { background: #3a3a44; color: #aad4ff; }
  #emoji-backdrop {
    position: absolute; inset: 0; z-index: 199; display: none;
  }
  #emoji-backdrop.open { display: block; }
  #emoji-picker {
    position: absolute;
    z-index: 200;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 232px;
    max-height: 156px;
    background: #1e1e24;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 6px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }
  #emoji-picker.open { display: block; }
  #emoji-picker::-webkit-scrollbar { width: 2px; }
  #emoji-picker::-webkit-scrollbar-thumb { background: #2a2a2a; }
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .emoji-btn {
    font-size: 17px;
    height: 28px;
    background: none; border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .emoji-btn:active { background: #2a2a2a; }
</style>
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- SCREEN: Chat List                                                  -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-list" class="screen active">
  <div class="header">
    <div class="title">Telegram</div>
    <div id="conn-dot" style="width:6px;height:6px;border-radius:50%;background:#f9a825" title="connecting"></div>
    <div class="badge-total" id="total-unread" style="display:none">0</div>
    <button class="btn-read-all" id="btn-read-all" style="display:none">✓ read</button>
  </div>
  <div class="chat-list" id="chat-list"></div>
  <div class="status-bar">
    <span>Scroll: navigate</span>
    <span class="hint">PTT: open</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- SCREEN: Chat View                                                  -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-chat" class="screen">
  <div class="header">
    <div class="back" id="btn-back">‹</div>
    <div class="title" id="chat-title">Chat</div>
    <div id="btn-tts" style="font-size:14px;cursor:pointer;padding:2px 4px;opacity:0.5;" title="Toggle TTS">🔇</div>
    <div id="btn-keyboard" style="font-size:13px;cursor:pointer;padding:2px 4px;opacity:0.7;" title="Type message">⌨️</div>
  </div>
  <div class="messages-list" id="messages-list"></div>
  <div id="ptt-btn" style="
    height: 36px; min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; border-top: 1px solid #2a2a2a;
    font-size: 11px; font-weight: 600; color: #2aabee;
    user-select: none; -webkit-user-select: none;
    cursor: pointer; letter-spacing: 0.5px;
  ">🎙 HOLD TO SPEAK</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- SCREEN: Confirm Send                                               -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-confirm" class="screen">
  <div class="header">
    <div class="title">Confirm Message</div>
  </div>
  <div class="confirm-body">
    <div class="confirm-label">Transcription</div>
    <div class="confirm-text" id="confirm-text"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="btn-discard">Cancel</button>
      <button class="btn-send" id="btn-confirm-send">Send</button>
    </div>
  </div>
</div>

<!-- Setup Screen (first run — no backend configured) -->
<div id="screen-setup" class="screen">
  <div class="header">
    <div class="title">Setup</div>
  </div>
  <div class="confirm-body" style="gap:6px">
    <div class="confirm-label">Backend URL</div>
    <input type="text" id="setup-url" placeholder="https://your-backend.com"
      style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:6px;font-size:10px;color:#e8e8e8;font-family:inherit;outline:none;width:100%">
    <div class="confirm-label" style="margin-top:2px">Auth Token</div>
    <input type="text" id="setup-token" placeholder="your-secret-token"
      style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:6px;font-size:10px;color:#e8e8e8;font-family:inherit;outline:none;width:100%">
    <div style="flex:1"></div>
    <div class="confirm-label" style="font-size:8px;color:#555;line-height:1.4">
      Tip: pass ?backend=URL&token=TOKEN in the sideload URL to skip this screen
    </div>
    <div class="confirm-actions">
      <button class="btn-send" id="btn-setup-save" style="width:100%">Connect</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- SCREEN: Compose (keyboard text input)                              -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-compose" class="screen">
  <div class="header">
    <div class="back" id="btn-compose-cancel">‹</div>
    <div class="title">Type Message</div>
    <button id="btn-compose-send" style="font-size:11px;background:#2aabee;border:none;border-radius:4px;padding:4px 8px;color:#fff;cursor:pointer;font-weight:600;">Send</button>
  </div>
  <div id="compose-history"></div>
  <div id="compose-area">
    <div id="compose-display" contenteditable="true" spellcheck="false" inputmode="none"></div>
    <button id="kbd-dismiss-btn" title="Back to chat">&#8964;</button>
  </div>
  <div id="virtual-keyboard">
    <div class="kbd-row">
      <button class="key" data-k="q">q</button><button class="key" data-k="w">w</button><button class="key" data-k="e">e</button><button class="key" data-k="r">r</button><button class="key" data-k="t">t</button><button class="key" data-k="y">y</button><button class="key" data-k="u">u</button><button class="key" data-k="i">i</button><button class="key" data-k="o">o</button><button class="key" data-k="p">p</button>
    </div>
    <div class="kbd-row" style="padding:0 5px">
      <button class="key" data-k="a">a</button><button class="key" data-k="s">s</button><button class="key" data-k="d">d</button><button class="key" data-k="f">f</button><button class="key" data-k="g">g</button><button class="key" data-k="h">h</button><button class="key" data-k="j">j</button><button class="key" data-k="k">k</button><button class="key" data-k="l">l</button>
    </div>
    <div class="kbd-row">
      <button class="key wide" id="kbd-shift">&#8679;</button>
      <button class="key" data-k="z">z</button><button class="key" data-k="x">x</button><button class="key" data-k="c">c</button><button class="key" data-k="v">v</button><button class="key" data-k="b">b</button><button class="key" data-k="n">n</button><button class="key" data-k="m">m</button>
      <button class="key wide" id="kbd-back">&#9003;</button>
    </div>
    <div class="kbd-row">
      <button class="key wide" id="kbd-sym">?123</button>
      <button class="key" id="kbd-emoji">😊</button>
      <button class="key space" id="kbd-space">space</button>
      <button class="key" data-k=".">.</button>
      <button class="key wide action" id="kbd-enter">&#9166;</button>
    </div>
  </div>
</div>

<!-- Recording Overlay (floats above chat view) -->
<div class="recording-overlay" id="recording-overlay">
  <div class="rec-ring"><div class="rec-dot"></div></div>

<script>

// ─── Configuration ────────────────────────────────────────────────────
// Priority order:
//   1. ?backend= and ?token= URL params  (QR sideload or harness)
//   2. localStorage (remembered from a previous visit)
//   3. Same-origin auto-detect: if served directly from the backend
//      (i.e. no ?backend= param and no saved URL), use window.location.origin
//      so zero config is needed when opening http://localhost:3000/

const params = new URLSearchParams(location.search);

const savedUrl   = localStorage.getItem('r1tg_backend');
const savedToken = localStorage.getItem('r1tg_token');

const CONFIG = {
  backendUrl: params.get('backend') || savedUrl || window.location.origin,
  authToken:  params.get('token')   || savedToken || '',
};

// Persist URL params to localStorage for next visit
if (params.get('backend')) {
  CONFIG.backendUrl = params.get('backend');
  localStorage.setItem('r1tg_backend', CONFIG.backendUrl);
}
if (params.get('token')) {
  CONFIG.authToken = params.get('token');
  localStorage.setItem('r1tg_token', CONFIG.authToken);
}

// ─── State ────────────────────────────────────────────────────────────
let currentScreen = 'list';
let chats = [];
let selectedIdx = 0;
let currentChatId = null;
let currentChatName = '';
let messages = [];
let pendingTranscript = '';
let isRecording = false;
let chatPollTimer = null;
let lastSeenMsgId = 0;
let recognition = null;
let ws = null;
let refreshTimer = null;
let isLandscape = false;
const $  = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const screenList    = $('#screen-list');
const screenChat    = $('#screen-chat');
const screenConfirm = $('#screen-confirm');
const screenSetup   = $('#screen-setup');
const screenCompose = $('#screen-compose');
const chatListEl    = $('#chat-list');
const msgsListEl    = $('#messages-list');
const totalUnread   = $('#total-unread');
const chatTitle     = $('#chat-title');
const confirmText   = $('#confirm-text');
const recOverlay    = $('#recording-overlay');
const toastEl       = $('#toast');
const connDot       = $('#conn-dot');

// ─── Helpers ──────────────────────────────────────────────────────────
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (CONFIG.authToken) h['X-Auth-Token'] = CONFIG.authToken;
  return h;
}

async function api(path, opts = {}) {
  const url = `${CONFIG.backendUrl}${path}`;
  const res = await fetch(url, { headers: headers(), ...opts });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function populateComposeHistory() {
  const el = document.getElementById('compose-history');
  if (!el) return;
  const recent = messages.slice(-8);
  if (!recent.length) { el.innerHTML = ''; return; }
  el.innerHTML = recent.map(m => `
    <div class="msg-bubble ${m.out ? 'out' : 'in'}">
      ${!m.out ? `<div class="msg-sender">${esc(m.senderName)}</div>` : ''}
      <div>${esc(m.text || '')}</div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function showScreen(name) {
  currentScreen = name;
  screenList.classList.toggle('active', name === 'list');
  screenChat.classList.toggle('active', name === 'chat');
  screenConfirm.classList.toggle('active', name === 'confirm');
  screenSetup.classList.toggle('active', name === 'setup');
  screenCompose.classList.toggle('active', name === 'compose');
  if (name === 'compose') { populateComposeHistory(); setTimeout(() => composeDisplay.focus(), 50); }
}

function setConnStatus(state) {
  // state: 'ok' | 'error' | 'loading'
  const colors = { ok: '#43a047', error: '#e53935', loading: '#f9a825' };
  connDot.style.background = colors[state] || colors.loading;
}

function toast(msg, ms = 1800) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), ms);
}

function avatarColor(name) {
  const colors = ['#e53935','#8e24aa','#3949ab','#00897b','#f4511e','#6d4c41','#546e7a','#d81b60'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

function formatTime(unixSec) {
  if (!unixSec) return '';
  const d = new Date(unixSec * 1000);
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 24) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diffH < 168) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  if (!text) return '';
  // Escape HTML first (XSS safety)
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Fenced code blocks
  s = s.replace(/```([\s\S]*?)```/g, (_, c) => '<pre><code>' + c.trim() + '</code></pre>');
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Process lines — handle bullet lists and line breaks
  const lines = s.split('\n');
  let out = '';
  let inList = false;
  for (const line of lines) {
    const li = line.match(/^[\-\*]\s+(.+)/);
    if (li) {
      if (!inList) { out += '<ul>'; inList = true; }
      out += '<li>' + li[1] + '</li>';
    } else {
      if (inList) { out += '</ul>'; inList = false; }
      if (line === '') {
        if (!out.endsWith('<br>')) out += '<br>';
      } else {
        if (out && !out.endsWith('</ul>') && !out.endsWith('</pre>')) out += '<br>';
        out += line;
      }
    }
  }
  if (inList) out += '</ul>';
  return out;
}


// ─── Chat List ────────────────────────────────────────────────────────
async function loadChats() {
  try {
    const data = await api('/chats');
    chats = data.chats || [];

    // Total unread
    const total = chats.reduce((s, c) => s + c.unread, 0);
    if (total > 0) {
      totalUnread.textContent = total > 99 ? '99+' : total;
      totalUnread.style.display = '';
      $('#btn-read-all').style.display = 'inline-block';
    } else {
      totalUnread.style.display = 'none';
      $('#btn-read-all').style.display = 'none';
    }

    renderChatList();
  } catch (err) {
    setConnStatus('error');
    chatListEl.innerHTML = `<div class="state-msg">Could not load chats.<br>${err.message}</div>`;
  }
}

function renderChatList() {
  if (!chats.length) {
    chatListEl.innerHTML = '<div class="state-msg">No chats found</div>';
    return;
  }

  chatListEl.innerHTML = chats.map((c, i) => `
    <div class="chat-item ${i === selectedIdx ? 'selected' : ''}" data-idx="${i}">
      <div class="chat-avatar" ${c.hasPhoto ? `style="background-image: url(/chats/${c.id}/photo?token=${new URL(location.href).searchParams.get('token') || ''}); background-size: cover; background-position: center"` : `style="background:${avatarColor(c.name)}"` }>${!c.hasPhoto ? (c.name[0] || '?').toUpperCase() : ''}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(c.name)}</div>
        <div class="chat-preview">${esc(c.lastMessage)}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${formatTime(c.lastDate)}</div>
        ${c.unread ? `<div class="unread-badge">${c.unread > 99 ? '99+' : c.unread}</div>` : ''}
      </div>
    </div>
  `).join('');

  // Tap handler
  chatListEl.querySelectorAll('.chat-item').forEach((el) => {
    el.addEventListener('click', () => {
      selectedIdx = parseInt(el.dataset.idx);
      renderChatList();
      openChat(chats[selectedIdx]);
    });
  });

  // Scroll selected into view
  const sel = chatListEl.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

// ─── Chat View ────────────────────────────────────────────────────────
async function openChat(chat) {
  currentChatId = chat.id;
  currentChatName = chat.name;
  
  // Update header with photo and name
  const token = new URL(location.href).searchParams.get('token') || '';
  chatTitle.innerHTML = `
    ${chat.hasPhoto ? `<img src="/chats/${chat.id}/photo?token=${token}" alt="" style="width:24px;height:24px;border-radius:50%;margin-right:8px;vertical-align:middle;">` : ''}
    <span>${esc(chat.name)}</span>
  `;
  
  showScreen('chat');

  msgsListEl.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading…</div>';

  try {
    const data = await api(`/chats/${chat.id}/messages?limit=25`);
    messages = data.messages || [];
    lastSeenMsgId = messages.reduce((max, m) => Math.max(max, m.id), 0);
    renderMessages();
    startChatPolling();

    // Mark as read
    api(`/chats/${chat.id}/read`, { method: 'POST' }).catch(() => {});
  } catch (err) {
    msgsListEl.innerHTML = `<div class="state-msg">Error loading messages</div>`;
  }
}

function addReactionToMessage(msgId, emoji) {
  const bubble = msgsListEl.querySelector('.msg-bubble[data-msgid="' + msgId + '"]');
  if (!bubble) return;
  let reactionsEl = bubble.querySelector('.msg-reactions');
  if (!reactionsEl) {
    reactionsEl = document.createElement('div');
    reactionsEl.className = 'msg-reactions';
    const timeEl = bubble.querySelector('.msg-time');
    timeEl ? bubble.insertBefore(reactionsEl, timeEl) : bubble.appendChild(reactionsEl);
  }
  const existing = [...reactionsEl.querySelectorAll('.msg-reaction')].find(el => el.textContent.trim().startsWith(emoji));
  if (existing) {
    const n = parseInt(existing.textContent.trim().split(' ').pop()) || 1;
    existing.textContent = emoji + ' ' + (n + 1);
  } else {
    const span = document.createElement('span');
    span.className = 'msg-reaction';
    span.textContent = emoji + ' 1';
    reactionsEl.appendChild(span);
  }
}

function renderMessages() {
  if (!messages.length) {
    msgsListEl.innerHTML = '<div class="state-msg">No messages yet</div>';
    return;
  }

  msgsListEl.innerHTML = messages.map((m) => {
    const photoTag = m.hasPhoto
      ? `<img src="${CONFIG.backendUrl}/chats/${currentChatId}/messages/${m.id}/photo?token=${encodeURIComponent(CONFIG.authToken)}" style="max-width:100%;border-radius:5px;margin-top:3px;display:block;" loading="lazy">`
      : '';
    const audioTag = m.hasAudio
      ? `<div class="audio-player" data-url="${CONFIG.backendUrl}/chats/${currentChatId}/messages/${m.id}/audio?token=${encodeURIComponent(CONFIG.authToken)}"><span class="audio-play-btn">▶</span><span class="audio-label">${esc(m.audioName || (m.isVoice ? 'Voice Message' : 'Audio'))}</span></div>`
      : '';
    const replyTag = m.replyTo
      ? `<div class="msg-reply"><span class="msg-reply-author">${esc(m.replyTo.author)}</span>${esc(m.replyTo.text)}</div>`
      : '';
    const reactTag = (m.reactions?.length)
      ? `<div class="msg-reactions">${m.reactions.map(r => `<span class="msg-reaction">${r.emoji} ${r.count}</span>`).join('')}</div>`
      : '';
    return `
    <div class="msg-bubble ${m.out ? 'out' : 'in'}${m.hasPhoto ? ' has-photo' : ''}" data-msgid="${m.id}">
      ${!m.out ? `<div class="msg-sender">${esc(m.senderName)}</div>` : ''}
      ${replyTag}
      ${m.text ? `<div>${mdToHtml(m.text)}</div>` : ''}
      ${photoTag}${audioTag}
      ${reactTag}
      <div class="msg-time">${formatTime(m.date)}</div>
    </div>
  `;
  }).join('');

  // Scroll to bottom
  msgsListEl.scrollTop = msgsListEl.scrollHeight;
}

// ─── Speech Recognition — Dual Mode ───────────────────────────────────
// Mode 1: R1 native (CreationVoiceHandler) — preferred on device
// Mode 2: Web Speech API (desktop browsers)
// Mode 3: MediaRecorder → POST /stt (backend Whisper fallback)
let sttMode = 'web'; // 'web', 'backend', or 'r1'
let mediaRecorder = null;
let audioChunks = [];

// R1 dispatches sttEnded via onPluginMessage. We set this at top level so the
// bridge can see it before any event fires.
window.onPluginMessage = function(data) {
  if (!data || typeof data !== 'object') return;

  if (data.type === 'sttStarted' || data.type === 'sttStart' || data.type === 'recordingStarted') {
    // Bridge confirmed recording started — keep overlay visible
    if (!isRecording) {
      isRecording = true;
      recOverlay.classList.add('active');
    }
    return;
  }

  if (data.type === 'sttEnded') {
    isRecording = false;
    recOverlay.classList.remove('active');
    const t = (data.transcript || '').trim();
    if (t) {
      showConfirm(t);
    } else {
      toast('No speech detected');
    }
  }
};

function initSpeechRecognition() {
  // Prefer R1 native STT when running inside the R1 WebView
  if (typeof CreationVoiceHandler !== 'undefined') {
    console.log('R1 CreationVoiceHandler detected — using native STT');
    sttMode = 'r1';
    return null;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    console.log('Web Speech API unavailable — using backend STT');
    sttMode = 'backend';
    return null;
  }

  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = false;
  rec.lang = 'en-US';
  rec.maxAlternatives = 1;

  rec.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        transcript += e.results[i][0].transcript;
      }
    }
    if (transcript.trim()) {
      pendingTranscript = transcript.trim();
    }
  };

  rec.onerror = (e) => {
    console.warn('STT error:', e.error);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      sttMode = 'backend';
      toast('Mic denied — using backend STT');
    } else if (e.error !== 'no-speech') {
      toast('Voice error: ' + e.error);
    }
  };

  rec.onend = () => {
    if (isRecording) {
      try { rec.start(); } catch (err) {}
    }
  };

  return rec;
}

async function startMediaRecorder() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.start(250);
  } catch (err) {
    toast('Mic unavailable');
    console.error('MediaRecorder error:', err);
  }
}

async function stopMediaRecorderAndTranscribe() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    toast('No audio captured');
    return;
  }

  return new Promise((resolve) => {
    mediaRecorder.onstop = async () => {
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      if (audioChunks.length === 0) {
        toast('No audio captured');
        resolve();
        return;
      }

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];

      toast('Transcribing…');
      try {
        const url = `${CONFIG.backendUrl}/stt`;
        const res = await fetch(url, {
          method: 'POST',
          headers: {
            'X-Auth-Token': CONFIG.authToken,
            'Content-Type': 'application/octet-stream',
          },
          body: blob,
        });

        if (!res.ok) throw new Error(`STT ${res.status}`);
        const data = await res.json();

        if (data.text && data.text.trim()) {
          pendingTranscript = data.text.trim();
        }
      } catch (err) {
        toast('STT failed: ' + err.message);
        console.error('Backend STT error:', err);
      }
      resolve();
    };

    mediaRecorder.stop();
  });
}

// ─── Recording Control ───────────────────────────────────────────────
// R1 mode: handled inline in longPressStart/longPressEnd listeners below.
// Web/backend mode: used by the on-screen PTT button and keyboard fallback.
function startRecording() {
  if (isRecording) return;
  if (sttMode === 'r1') return; // R1 mode uses direct bridge calls, not this path
  isRecording = true;
  pendingTranscript = '';
  recOverlay.classList.add('active');

  if (sttMode === 'web') {
    if (!recognition) recognition = initSpeechRecognition();
    if (recognition) {
      try { recognition.start(); } catch (err) {}
    } else {
      startMediaRecorder();
    }
  } else {
    startMediaRecorder();
  }
}

async function stopRecording() {
  if (!isRecording) return;
  if (sttMode === 'r1') return; // R1 mode handled by onPluginMessage
  isRecording = false;
  recOverlay.classList.remove('active');

  if (sttMode === 'web' && recognition) {
    try { recognition.stop(); } catch (err) {}
    await new Promise(r => setTimeout(r, 400));
  } else {
    await stopMediaRecorderAndTranscribe();
  }

  if (pendingTranscript) {
    showConfirm(pendingTranscript);
  } else {
    toast('No speech detected');
  }
}

// ─── Confirm & Send ───────────────────────────────────────────────────
function showConfirm(text) {
  confirmText.textContent = text;
  showScreen('confirm');
}

async function sendMessage() {
  const text = confirmText.textContent;
  if (!text || !currentChatId) return;

  toast('Sending…');
  showScreen('chat');

  try {
    const result = await api(`/chats/${currentChatId}/send`, {
      method: 'POST',
      body: JSON.stringify({ text }),
    });

    const sentId = result.messageId || Date.now();
    lastSeenMsgId = Math.max(lastSeenMsgId, sentId);
    messages.push({
      id: sentId,
      text,
      date: Math.floor(Date.now() / 1000),
      out: true,
      senderName: 'You',
    });
    renderMessages();
    toast('Sent ✓');
  } catch (err) {
    toast('Send failed');
  }
}

// ─── WebSocket (live updates) ─────────────────────────────────────────
function connectWS() {
  if (!CONFIG.backendUrl) return;

  const wsUrl = CONFIG.backendUrl.replace(/^http/, 'ws') + '/ws?token=' + encodeURIComponent(CONFIG.authToken);

  try {
    ws = new WebSocket(wsUrl);

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'new_message') {
          handleLiveMessage(data);
        }
      } catch (err) {}
    };

    ws.onclose = () => {
      setTimeout(connectWS, 5000);
    };

    ws.onerror = () => {
      if (ws) ws.close();
    };
  } catch (err) {
    setTimeout(connectWS, 5000);
  }
}

// ─── TTS Module ───────────────────────────────────────────────────────
let ttsEnabled = false;
let ttsAudio = null;

function speak(text) {
  if (!ttsEnabled || !text?.trim()) return;

  // Path 1: R1 native speaker via PluginMessageHandler
  if (typeof PluginMessageHandler !== 'undefined') {
    PluginMessageHandler.postMessage(JSON.stringify({
      message: text,
      useLLM: false,
      wantsR1Response: true,
    }));
    return;
  }

  // Path 2: Server-side TTS (OpenAI) → HTML5 audio
  (async () => {
    try {
      if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
      const url = `${CONFIG.backendUrl}/tts`;
      const hdrs = { 'Content-Type': 'application/json' };
      if (CONFIG.authToken) hdrs['x-auth-token'] = CONFIG.authToken;
      const r = await fetch(url, { method: 'POST', headers: hdrs, body: JSON.stringify({ text }) });
      if (!r.ok) throw new Error('TTS failed');
      const blob = await r.blob();
      const audioUrl = URL.createObjectURL(blob);
      ttsAudio = new Audio(audioUrl);
      ttsAudio.play();
      ttsAudio.onended = () => { URL.revokeObjectURL(audioUrl); ttsAudio = null; };
    } catch {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
      }
    }
  })();
}


function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = $('#btn-tts');
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.style.opacity = ttsEnabled ? '1' : '0.5';
  if (!ttsEnabled) { ttsAudio?.pause(); ttsAudio = null; window.speechSynthesis?.cancel(); }
}

function handleLiveMessage(data) {
  if (currentScreen === 'chat' && data.chatId === currentChatId) {
    messages.push(data.message);
    lastSeenMsgId = Math.max(lastSeenMsgId, data.message.id);
    renderMessages();
    if (!data.message.out) { playPing(); speak(data.message.text); }
  }

  if (currentScreen === 'list') {
    loadChats();
  }
}

function startChatPolling() {
  stopChatPolling();
  chatPollTimer = setInterval(async () => {
    if (currentScreen !== 'chat' || !currentChatId) return;
    try {
      const data = await api(`/chats/${currentChatId}/messages?limit=5`);
      const incoming = (data.messages || []).filter(m => m.id > lastSeenMsgId);
      if (!incoming.length) return;
      for (const m of incoming) {
        messages.push(m);
        lastSeenMsgId = Math.max(lastSeenMsgId, m.id);
        if (!m.out) { playPing(); speak(m.text); }
      }
      renderMessages();
    } catch {}
  }, 4000);
}

function stopChatPolling() {
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
}

// ─── Input Handlers ───────────────────────────────────────────────────
function handleScroll(direction) {
  playTick()
  if (currentScreen === 'list') {
    if (direction === 'up' && selectedIdx > 0) selectedIdx--;
    if (direction === 'down' && selectedIdx < chats.length - 1) selectedIdx++;
    renderChatList();
  } else if (currentScreen === 'chat') {
    const delta = direction === 'up' ? -40 : 40;
    msgsListEl.scrollBy({ top: delta, behavior: 'smooth' });
  } else if (currentScreen === 'confirm') {
    const cancelBtn = $('#btn-discard');
    const sendBtn = $('#btn-confirm-send');
    if (direction === 'up' || direction === 'down') {
      if (document.activeElement === sendBtn) {
        cancelBtn.focus();
      } else {
        sendBtn.focus();
      }
    }
  }
}

function handleSelect() {
  if (currentScreen === 'list' && chats[selectedIdx]) {
    openChat(chats[selectedIdx]);
  } else if (currentScreen === 'confirm') {
    sendMessage();
  }
}

function handleBack() {
  if (currentScreen === 'chat') {
    stopChatPolling();
    showScreen('list');
    currentChatId = null;
    loadChats();
  } else if (currentScreen === 'confirm') {
    showScreen('chat');
  }
}

// ─── R1 Hardware Events ───────────────────────────────────────────────
// Documented R1 pattern: the native bridge dispatches CustomEvents on window.
//   longPressStart / longPressEnd  → hold-to-record
//   sideClick                      → short tap (navigation)
//   scrollUp / scrollDown          → scroll wheel
// Transcripts come back via window.onPluginMessage (wired above).

window.addEventListener('longPressStart', () => {
  // Only record from chat screen
  if (currentScreen !== 'chat' || isRecording) return;

  if (typeof CreationVoiceHandler !== 'undefined') {
    // R1 native path
    isRecording = true;
    recOverlay.classList.add('active');
    CreationVoiceHandler.postMessage('start');
  } else {
    // Desktop / keyboard-fallback path
    startRecording();
  }
});

window.addEventListener('longPressEnd', () => {
  if (!isRecording) return;

  if (typeof CreationVoiceHandler !== 'undefined') {
    // R1 native path — transcript arrives asynchronously via onPluginMessage.
    // Keep isRecording=true; onPluginMessage's sttEnded branch will clear it
    // and hide the overlay.
    CreationVoiceHandler.postMessage('stop');
  } else {
    stopRecording();
  }
});

window.addEventListener('sideClick', () => {
  // Short tap: navigation only, never STT.
  if (currentScreen === 'list') {
    handleSelect();
  } else if (currentScreen === 'confirm') {
    handleSelect();
  }
  // On chat screen: intentionally do nothing — hold the button for STT.
});

window.addEventListener('scrollUp',   () => handleScroll('down'));
window.addEventListener('scrollDown', () => handleScroll('up'));

// ─── Keyboard Fallback (desktop testing) ──────────────────────────────
// Translates keyboard input into the same window events the R1 bridge dispatches,
// so the hardware handlers above are the single source of truth.
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (currentScreen === 'compose') return;
  if (e.key === ' ')              { e.preventDefault(); window.dispatchEvent(new Event('longPressStart')); }
  else if (e.key === 'Escape')    { window.dispatchEvent(new Event('sideClick')); }
  else if (e.key === 'ArrowUp')   { window.dispatchEvent(new Event('scrollUp')); }
  else if (e.key === 'ArrowDown') { window.dispatchEvent(new Event('scrollDown')); }
  else if (e.key === 'Enter')     { handleSelect(); }
  else if (e.key === 'Backspace') { handleBack(); }
});
document.addEventListener('keyup', (e) => {
  if (currentScreen === 'compose') return;
  if (e.key === ' ') {
    e.preventDefault();
    window.dispatchEvent(new Event('longPressEnd'));
  }
});

const composeDisplay = document.getElementById('compose-display');

function insertAtCursor(text) {
  composeDisplay.focus();
  document.execCommand('insertText', false, text);
}
function deleteAtCursor() {
  composeDisplay.focus();
  document.execCommand('delete');
}
function clearCompose() {
  composeDisplay.innerHTML = '';
  composeDisplay.focus();
}
function getCompose() {
  return (composeDisplay.innerText || '').trim();
}

async function sendCompose() {
  const text = getCompose();
  if (!text || !currentChatId) return;
  clearCompose();
  toast('Sending…');
  showScreen('chat');
  try {
    await api('/chats/' + currentChatId + '/send', {
      method: 'POST',
      body: JSON.stringify({ text }),
    });
    messages.push({ id: Date.now(), text, date: Math.floor(Date.now()/1000), out: true, senderName: 'You' });
    renderMessages();
    toast('Sent ✓');
  } catch (err) {
    toast('Send failed');
  }
}

// ─── DOM Keyboard logic ────────────────────────────────────────────────────
(function() {
  let shifted = false;
  let symMode = false;

  const letters = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m']
  ];
  const symbols = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['-','/',':',';','(',')','$','&','@','"'],
    ['.',',','?','!','\'']
  ];

  function applyShift() {
    document.querySelectorAll('.key[data-k]').forEach(k => {
      const v = k.dataset.k;
      if (v.length === 1 && v >= 'a' && v <= 'z') k.textContent = shifted ? v.toUpperCase() : v;
    });
    const s = document.getElementById('kbd-shift');
    if (s) s.classList.toggle('shifted', shifted);
  }

  function applySymMode() {
    const allRows = document.querySelectorAll('.kbd-row');
    const symBtn  = document.getElementById('kbd-sym');
    if (symMode) {
      [0,1,2].forEach(r => {
        const keys = allRows[r] && allRows[r].querySelectorAll('.key[data-k]');
        if (keys) keys.forEach((k,i) => { const s = (symbols[r]||[])[i]; if (s !== undefined) { k.dataset.k = s; k.textContent = s; }});
      });
      if (symBtn) symBtn.textContent = 'ABC';
    } else {
      [0,1,2].forEach(r => {
        const keys = allRows[r] && allRows[r].querySelectorAll('.key[data-k]');
        if (keys) keys.forEach((k,i) => { const l = (letters[r]||[])[i]; if (l !== undefined) { k.dataset.k = l; k.textContent = shifted ? l.toUpperCase() : l; }});
      });
      if (symBtn) symBtn.textContent = '?123';
    }
  }

  document.getElementById('virtual-keyboard').addEventListener('click', function(e) {
    const key = e.target.closest('.key');
    if (!key) return;
    const id = key.id, v = key.dataset.k;
    if (id === 'kbd-shift') {
      shifted = !shifted; symMode = false; applyShift();
    } else if (id === 'kbd-sym') {
      symMode = !symMode; applySymMode();
    } else if (id === 'kbd-back') {
      deleteAtCursor();
    } else if (id === 'kbd-space') {
      insertAtCursor(' ');
    } else if (id === 'kbd-enter') {
      sendCompose();
    } else if (id === 'kbd-emoji') {
      openEmojiPicker();
    } else if (v) {
      const ch = (shifted && !symMode) ? v.toUpperCase() : v;
      insertAtCursor(ch);
      if (shifted && !symMode) { shifted = false; applyShift(); }
    }
  });
})();

// ─── Emoji picker ─────────────────────────────────────────────────────────
(function() {
  const EMOJIS = [
    '👍','👎','❤️','😂','😮','😢','😡','🔥','✅','👀','🎉','💯',
    '😊','😎','🤔','😅','😭','🥲','🤣','😍','😤','🤯','😴','🥳',
    '🙏','👋','💪','🤝','👏','🙌','⭐','💀','💥','🏆','🎯','💩',
    '🫡','🫠','🐐','🍕','❓','💬','🎵','🎮','📸','🤖','👑','🌟',
  ];
  const picker   = document.getElementById('emoji-picker');
  const backdrop = document.getElementById('emoji-backdrop');
  const grid     = document.getElementById('emoji-grid');

  grid.innerHTML = EMOJIS.map(e => `<button class="emoji-btn" data-e="${e}">${e}</button>`).join('');

  let emojiMode  = 'insert';
  let reactMsgId = null;

  function closePicker() {
    picker.classList.remove('open');
    backdrop.classList.remove('open');
    emojiMode = 'insert'; reactMsgId = null;
  }

  window.openEmojiPicker = function(mode, msgId) {
    emojiMode  = mode || 'insert';
    reactMsgId = msgId || null;
    picker.classList.add('open');
    backdrop.classList.add('open');
    picker.scrollTop = 0;
  };

  backdrop.addEventListener('click', closePicker);

  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    const emoji = btn.dataset.e;
    if (emojiMode === 'react' && reactMsgId) {
      const msgId = reactMsgId;
      closePicker();
      api('/chats/' + currentChatId + '/messages/' + msgId + '/react', {
        method: 'POST', body: JSON.stringify({ emoji }),
      }).then(() => addReactionToMessage(msgId, emoji))
        .catch(() => toast('React failed'));
      return;
    }
    insertAtCursor(emoji);
    closePicker();
  });
})();

// ─── Audio playback ────────────────────────────────────────────────────────
(function() {
  let activeAudio  = null;
  let activePlayer = null;

  function stopCurrent() {
    if (activeAudio)  { activeAudio.pause(); activeAudio = null; }
    if (activePlayer) { activePlayer.classList.remove('playing'); activePlayer.querySelector('.audio-play-btn').textContent = '▶'; activePlayer = null; }
  }

  msgsListEl.addEventListener('click', function(e) {
    const player = e.target.closest('.audio-player');
    if (!player) return;
    const url = player.dataset.url;
    if (!url) return;
    if (player === activePlayer) {
      if (activeAudio.paused) { activeAudio.play(); player.querySelector('.audio-play-btn').textContent = '⏸'; }
      else                    { activeAudio.pause(); player.querySelector('.audio-play-btn').textContent = '▶'; }
      return;
    }
    stopCurrent();
    const audio = new Audio(url);
    activeAudio = audio; activePlayer = player;
    player.classList.add('playing');
    player.querySelector('.audio-play-btn').textContent = '⏸';
    audio.play();
    audio.onended = stopCurrent;
  });
})();

// ─── Long-press to react ───────────────────────────────────────────────────
(function() {
  let lpTimer     = null;
  let lpTriggered = false;

  msgsListEl.addEventListener('touchstart', function(e) {
    const bubble = e.target.closest('.msg-bubble[data-msgid]');
    if (!bubble || e.target.closest('.audio-player')) return;
    const msgId = bubble.dataset.msgid;
    if (!msgId) return;
    lpTriggered = false;
    lpTimer = setTimeout(function() {
      lpTriggered = true;
      openEmojiPicker('react', msgId);
    }, 600);
  }, { passive: true });

  msgsListEl.addEventListener('touchmove',   function() { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
  msgsListEl.addEventListener('touchend',    function() { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
  msgsListEl.addEventListener('touchcancel', function() { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });

  msgsListEl.addEventListener('click', function(e) {
    if (lpTriggered) { lpTriggered = false; e.stopImmediatePropagation(); }
  }, true);
})();

// ─── Landscape Rotation ───────────────────────────────────────────────
(async function() {
  const appEl = document.getElementById('app');

  function setLandscape(on) {
    if (on === isLandscape) return;
    isLandscape = on;
    appEl.classList.toggle('landscape', on);
    document.body.classList.toggle('in-landscape', on);
  }

  function handleMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const ax = Math.abs(a.x || 0);
    if (!isLandscape && ax > 7) setLandscape(true);
    else if (isLandscape && ax < 4) setLandscape(false);
  }

  if (typeof window.creationSensors !== 'undefined') {
    try {
      const available = await window.creationSensors.accelerometer.isAvailable();
      if (available) {
        const cb = function(data) {
          const ax = Math.abs(data.x || 0);
          if (!isLandscape && ax > 0.7) setLandscape(true);
          else if (isLandscape && ax < 0.4) setLandscape(false);
        };
        window.creationSensors.accelerometer.start(cb, { frequency: 10 });
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) window.creationSensors.accelerometer.stop();
          else window.creationSensors.accelerometer.start(cb, { frequency: 10 });
        });
        return;
      }
    } catch(e) {}
  }
  if (typeof DeviceMotionEvent !== 'undefined') {
    window.addEventListener('devicemotion', handleMotion);
  }
})();

// ─── Landscape Touch-Scroll Remapping ────────────────────────────────
(function() {
  let touchStartX = 0;

  function activeScrollArea() {
    if (currentScreen === 'list') return document.getElementById('chat-list');
    if (currentScreen === 'chat') return document.getElementById('messages-list');
    return null;
  }

  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isLandscape) return;
    const sa = activeScrollArea();
    if (!sa) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - touchStartX;
    sa.scrollTop -= dx * 1.5;
    touchStartX = e.touches[0].clientX;
  }, { passive: false });
})();

// ─── Init ─────────────────────────────────────────────────────────────
async function startApp() {
  showScreen('list');
  chatListEl.innerHTML = '<div class="state-msg"><div class="spinner"></div>Connecting…</div>';
  setConnStatus('loading');

  // Detect STT mode (sets sttMode = 'r1' when CreationVoiceHandler present)
  initSpeechRecognition();
  console.log('R1 hardware controls: sttMode =', sttMode);

  // Test backend health
  try {
    const health = await api('/health');
    if (health.ok && health.telegram) {
      setConnStatus('ok');
    } else {
      setConnStatus('loading');
      toast('Telegram connecting…');
    }
  } catch (err) {
    setConnStatus('error');
    chatListEl.innerHTML = `<div class="state-msg">Backend unreachable<br><span style="font-size:8px;color:#555">${esc(CONFIG.backendUrl)}</span></div>`;
    return;
  }

  // Load chats
  await loadChats();
  setConnStatus('ok');

  // Connect WebSocket for live updates
  connectWS();

  // Periodic refresh (every 30s when on chat list)
  refreshTimer = setInterval(() => {
    if (currentScreen === 'list') loadChats();
  }, 30000);
}

// Decide: show setup screen or go straight to app.
(async () => {
  const isFileProtocol = location.protocol === 'file:';
  const hasNoConfig    = !CONFIG.backendUrl || CONFIG.backendUrl === 'null';
  if (isFileProtocol && hasNoConfig) {
    showScreen('setup');
  } else {
    await startApp();
  }
})();



// ─── Sound Effects ─────────────────────────────────────────────────────
let _audioCtx = null
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  if (_audioCtx.state === 'suspended') _audioCtx.resume()
  return _audioCtx
}

// Unlock AudioContext on first user gesture (browser requirement)
;(function unlockAudio() {
  const unlock = () => {
    getAudioCtx()
    document.removeEventListener('touchstart', unlock, true)
    document.removeEventListener('touchend',   unlock, true)
    document.removeEventListener('click',      unlock, true)
  }
  document.addEventListener('touchstart', unlock, true)
  document.addEventListener('touchend',   unlock, true)
  document.addEventListener('click',      unlock, true)
})()

function playTick() {
  try {
    const ctx = getAudioCtx()
    const t = ctx.currentTime
    // Noise burst — bandpass around 900Hz for a lower, poppier click
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate)
    const data = buf.getChannelData(0)
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1)
    const src = ctx.createBufferSource()
    src.buffer = buf
    const filter = ctx.createBiquadFilter()
    filter.type = 'bandpass'
    filter.frequency.setValueAtTime(900, t)
    filter.Q.value = 1.5
    const gain = ctx.createGain()
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination)
    gain.gain.setValueAtTime(0.35, t)
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03)
    src.start(t)
  } catch (_) {}
}

function playPing() {
  try {
    const ctx = getAudioCtx()
    const t = ctx.currentTime

    // Glimmery crystal partials — fast arpeggio, detuned sine pairs, long shimmer tails
    const gems = [
      [0.00, 1568, 1.000, 0.30],
      [0.03, 2093, 0.960, 0.26],
      [0.06, 2637, 0.920, 0.22],
      [0.09, 1319, 0.880, 0.20],
    ]
    gems.forEach(([delay, freq, detune, dur]) => {
      [freq, freq * detune].forEach(f => {
        const osc = ctx.createOscillator()
        const gain = ctx.createGain()
        osc.connect(gain); gain.connect(ctx.destination)
        osc.type = 'sine'
        osc.frequency.setValueAtTime(f, t + delay)
        gain.gain.setValueAtTime(0.0, t + delay)
        gain.gain.linearRampToValueAtTime(0.08, t + delay + 0.008)
        gain.gain.exponentialRampToValueAtTime(0.001, t + delay + dur)
        osc.start(t + delay); osc.stop(t + delay + dur + 0.02)
      })
    })
  } catch (_) {}
}
